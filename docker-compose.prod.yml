version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # Ajuste o 'config.wsgi' se o seu projeto tiver outro nome de pasta raiz
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000

    # Em produção com Traefik, não precisamos expor a porta 8000 para o mundo,
    # o Traefik falará com ela internamente pela rede.
    expose:
      - "8000"

    env_file:
      - .env

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      # Substitua pelo seu domínio real ou pelo domínio de demo
      - "traefik.http.routers.gnp-erp.rule=Host(`cargo.gnpsistemas.com.br`)"
      - "traefik.http.routers.gnp-erp.entrypoints=web"
      # Indica ao Traefik em qual porta o Gunicorn está ouvindo
      - "traefik.http.services.gnp-erp.loadbalancer.server.port=8000"
    volumes:
      - static_volume:/app/staticfiles

  nginx-static:
    image: nginx:alpine
    volumes:
      - static_volume:/var/www/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static.rule=Host(`cargo.gnpsistemas.com.br`) && PathPrefix(`/static/`)"
      - "traefik.http.services.static.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true

volumes:
  static_volume:
